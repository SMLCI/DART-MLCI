image: python:3.12

stages:
  - lint
  - test
  - build

lint:
  stage: lint
  script:
    - pip install ruff
    - ruff check dmc_masking/ tests/
    - ruff format --check dmc_masking/ tests/

test:
  stage: test
  script:
    - apt-get update && apt-get install -y libgl1-mesa-glx
    - pip install ".[dev]"
    - pytest -v --cov=dmc_masking --cov-report=xml --junitxml=test_report.xml tests/
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: test_report.xml

build:
  stage: build
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/*.whl
      - dist/*.tar.gz
