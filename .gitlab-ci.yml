image: python:3.12

variables:
  GIT_LFS_SKIP_SMUDGE: "1"

stages:
  - lint
  - test
  - build
  - docker

lint:
  stage: lint
  script:
    - pip install ruff
    - ruff check dmc_masking/ tests/
    - ruff format --check dmc_masking/ tests/

test:
  stage: test
  tags:
    - biggpu
  before_script:
    - apt-get update && apt-get install -y git-lfs libgl1 libglib2.0-0
    - git lfs install
    - git lfs pull
  script:
    - pip install ".[dev]"
    - pytest -v --cov=dmc_masking --cov-report=xml --junitxml=test_report.xml tests/
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    paths:
      - tests/test_results/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: test_report.xml

build:
  stage: build
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/*.whl
      - dist/*.tar.gz

docker-build:
  stage: docker
  image: docker:24.0.7
  tags:
    - biggpu
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  needs:
    - job: test
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      # Build the image
      docker build \
        --cache-from "$CI_REGISTRY_IMAGE:latest" \
        --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" \
        --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        .

      # Push commit SHA and branch tags
      docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
      docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"

      # Push 'latest' for main/develop
      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "develop" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi

      # Push version tag for releases
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      fi
